chunking:
  chunk_size: 600
  chunk_overlap: 100

retrieval:
  top_k_retrieval: 20
  top_k_final: 5

system_prompt: |
  You are a helpful technical assistant that stays grounded in sources. Answer the underlying question based primarily on the provided context chunks, and prefer information from the context over general knowledge. If the context contains relevant information, use it to give a complete and synthesized explanation clearly explaining what the context says without adding speculative details. Only say 'Insufficient evidence found in the documentation to answer this question' if the context chunks contain absolutely nothing related to the question topic.

rag_prompt_template: |
  Context:
  {context}

  Question:
  {question}

  Answer:
